<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Mandir System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #fdfbf7 0%, #f4f6f9 100%);
        padding: 20px 16px;
      }
      .container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background: #fff;
        padding: 40px 35px;
        border-radius: 18px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.09);
        border-top: 5px solid #f7a01a;
        animation: slideUp 0.5s ease-out;
        position: relative;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Mandir branding above card */
      .login-brand {
        text-align: center;
        margin-bottom: 10px;
        font-size: 0.85rem;
        color: #946c44;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .login-brand i {
        color: #f7a01a;
        margin-right: 5px;
      }
      .card h2 {
        margin-top: 0;
        margin-bottom: 6px;
        color: #946c44;
        font-size: 1.75rem;
        font-weight: 700;
      }
      .card h2 i {
        color: #f7a01a;
        margin-right: 8px;
      }
      .card-subtitle {
        font-size: 0.82rem;
        color: #aaa;
        margin-bottom: 22px;
        display: block;
      }
      .input-group {
        position: relative;
        margin-bottom: 16px;
      }
      .input-group i.icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #bbb;
        font-size: 1rem;
        pointer-events: none;
      }
      .input-group input {
        width: 100%;
        padding: 13px 15px 13px 44px;
        border: 1.5px solid #e8e8e8;
        border-radius: 10px;
        outline: none;
        font-size: 14.5px;
        font-family: "Poppins", sans-serif;
        transition: all 0.25s ease;
        background: #fafafa;
        color: #333;
      }
      .input-group input:focus {
        border-color: #f7a01a;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(247, 160, 26, 0.1);
      }
      .forgot {
        font-size: 0.83rem;
        text-align: right;
        color: #999;
        cursor: pointer;
        display: block;
        margin-top: -8px;
        margin-bottom: 18px;
        transition: color 0.25s;
        font-weight: 500;
      }
      .forgot:hover {
        color: #f7a01a;
      }
      .msg-box {
        padding: 10px 14px;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 14px;
        display: none;
        text-align: left;
      }
      .msg-box.error {
        background: #fdedec;
        color: #c0392b;
        display: block;
      }
      .msg-box.success {
        background: #eafaf1;
        color: #1e8449;
        display: block;
      }
      button.main-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        color: white;
        font-family: "Poppins", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, #f7a01a, #e08e12);
        box-shadow: 0 5px 18px rgba(247, 160, 26, 0.35);
        transition: all 0.25s ease;
        margin-bottom: 18px;
        letter-spacing: 0.3px;
      }
      button.main-btn:hover {
        background: linear-gradient(135deg, #d35400, #b84600);
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(211, 84, 0, 0.38);
      }
      button.main-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .back-home {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.88rem;
        color: #888;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.25s;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1.5px solid #e8e8e8;
      }
      .back-home:hover {
        color: #f7a01a;
        border-color: #f7a01a;
        background: #fff8ee;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .modal-card {
        width: 90%;
        max-width: 400px;
        margin: auto;
      }
      .close-btn {
        position: absolute;
        right: 16px;
        top: 12px;
        font-size: 22px;
        color: #aaa;
        cursor: pointer;
        background: none;
        border: none;
        box-shadow: none;
        padding: 4px 8px;
        width: auto;
        border-radius: 6px;
        transition: background 0.2s, color 0.2s;
      }
      .close-btn:hover {
        background: #f5f5f5;
        color: #333;
      }
      @media (max-width: 480px) {
        .card {
          padding: 30px 20px;
          border-radius: 14px;
        }
        .card h2 {
          font-size: 1.5rem;
        }
        button.main-btn {
          font-size: 0.95rem;
          padding: 13px;
        }
      }
      /* Toast */
      #_tw {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
        max-width: 340px;
      }
      .ti {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 18px;
        border-radius: 10px;
        font-family: Poppins, sans-serif;
        font-size: 13.5px;
        font-weight: 600;
        color: #fff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
        min-width: 220px;
        pointer-events: all;
        animation: tUp 0.35s cubic-bezier(0.21, 1.02, 0.73, 1) both;
        position: relative;
        overflow: hidden;
        line-height: 1.4;
      }
      .tb {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.4);
        animation: tBar 3.5s linear forwards;
      }
      @keyframes tUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes tBar {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }
      .to_ {
        animation: tDn 0.3s ease forwards !important;
      }
      @keyframes tDn {
        to {
          opacity: 0;
          transform: translateY(12px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2><i class="fa-solid fa-om"></i> Mandir Login</h2>
        <span class="card-subtitle"
          ><i
            class="fa-solid fa-place-of-worship"
            style="color: #f7a01a; margin-right: 4px"
          ></i
          >Shree Hanuman Mandir, Paliya</span
        >
        <div class="msg-box" id="loginMsg"></div>
        <div class="input-group">
          <i class="icon fa-solid fa-phone"></i>
          <input
            type="text"
            id="mobile"
            placeholder="Mobile Number"
            maxlength="10"
          />
        </div>
        <div class="input-group">
          <i class="icon fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Password" />
          <i
            class="fa-solid fa-eye"
            id="togglePassword"
            style="
              position: absolute;
              right: 15px;
              left: auto;
              cursor: pointer;
              color: #aaa;
              top: 50%;
              transform: translateY(-50%);
            "
          ></i>
        </div>
        <span class="forgot" onclick="openForgotModal()">Forgot password?</span>
        <button class="main-btn" id="loginBtn" onclick="login()">
          <i class="fa-solid fa-right-to-bracket"></i> Secure Login
        </button>
        <a href="index.html" class="back-home"
          ><i class="fa-solid fa-arrow-left"></i> Back to Home</a
        >
      </div>
    </div>

    <!-- FORGOT PASSWORD MODAL -->
    <div id="forgotModal" class="modal-overlay">
      <div class="card modal-card">
        <button class="close-btn" onclick="closeForgotModal()">×</button>
        <div id="resetStep1">
          <h2>
            <i class="fa-solid fa-envelope-circle-check"></i> Verify Account
          </h2>
          <div class="msg-box" id="resetMsg1"></div>
          <div class="input-group">
            <i class="icon fa-solid fa-at"></i>
            <input
              type="email"
              id="resetEmail"
              placeholder="Registered Email ID"
            />
          </div>
          <button class="main-btn" onclick="sendOTP()">
            <i class="fa-solid fa-paper-plane"></i> Verify & Send OTP
          </button>
        </div>
        <div id="resetStep2" style="display: none">
          <h2><i class="fa-solid fa-key"></i> New Password</h2>
          <p style="font-size: 0.85rem; color: #666; margin-bottom: 16px">
            Enter the 6-digit OTP sent to your email.
          </p>
          <div class="msg-box" id="resetMsg2"></div>
          <div class="input-group">
            <i class="icon fa-solid fa-shield-halved"></i>
            <input type="number" id="inputOTP" placeholder="Enter OTP" />
          </div>
          <div class="input-group">
            <i class="icon fa-solid fa-lock"></i>
            <input
              type="password"
              id="newPassword"
              placeholder="New Password (min 6 chars)"
            />
          </div>
          <button class="main-btn" onclick="verifyAndReset()">
            <i class="fa-solid fa-check-circle"></i> Update Password
          </button>
        </div>
      </div>
    </div>

    <div id="_tw"></div>
    <script src="config.js"></script>
    <script>
      // ── Redirect already-logged-in users away from login page
      (function () {
        try {
          let s = JSON.parse(localStorage.getItem("session"));
          if (s && Date.now() < s.expiry) {
            location.replace(s.role === "Admin" ? "admin.html" : "user.html");
          }
        } catch (e) {}
      })();

      // ── Security: block forward-navigation back to admin/user after logout
      // Push a dummy state so the browser has a "back" target on the login page
      history.pushState(null, "", location.href);
      window.addEventListener("popstate", function () {
        history.pushState(null, "", location.href);
      });
      // pageshow: catches bfcache-restored pages (back button with cache)
      window.addEventListener("pageshow", function (e) {
        if (e.persisted) {
          try {
            let s = JSON.parse(localStorage.getItem("session"));
            if (!s || Date.now() > s.expiry) {
              localStorage.clear();
              sessionStorage.clear();
            } else {
              location.replace(s.role === "Admin" ? "admin.html" : "user.html");
            }
          } catch (err) {
            localStorage.clear();
          }
        }
      });

      // ── inline toast for login page (before app.js loads)
      function toast(msg, type) {
        let wrap = document.getElementById("_tw");
        const bg =
          type === "error"
            ? "#e74c3c"
            : type === "warn"
            ? "#e67e22"
            : "#27ae60";
        const icon = type === "error" ? "✕" : type === "warn" ? "⚠" : "✓";
        let item = document.createElement("div");
        item.className = "ti";
        item.style.background = bg;
        let iconSpan = document.createElement("span");
        iconSpan.style.fontSize = "16px";
        iconSpan.textContent = icon;
        let msgSpan = document.createElement("span");
        msgSpan.style.flex = "1";
        msgSpan.textContent = msg;
        let bar = document.createElement("div");
        bar.className = "tb";
        item.appendChild(iconSpan);
        item.appendChild(msgSpan);
        item.appendChild(bar);
        wrap.appendChild(item);
        setTimeout(() => {
          item.classList.add("to_");
          setTimeout(() => item.remove(), 320);
        }, 3500);
      }
      function setMsg(id, text, type) {
        let el = document.getElementById(id);
        el.textContent = text;
        el.className = "msg-box " + (type || "");
        if (!text) el.className = "msg-box";
      }

      async function sha256(str) {
        const buf = await crypto.subtle.digest(
          "SHA-256",
          new TextEncoder().encode(str)
        );
        return Array.from(new Uint8Array(buf))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      // ── LOGIN (FIX #1 — password hashed, no alert)
      async function login() {
        let mobile = document.getElementById("mobile").value.trim();
        let password = document.getElementById("password").value;
        if (!mobile || !password) {
          setMsg(
            "loginMsg",
            "Please enter both mobile number and password.",
            "error"
          );
          return;
        }
        let btn = document.getElementById("loginBtn");
        btn.disabled = true;
        btn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
        setMsg("loginMsg", "", "");
        try {
          let hashedPwd = await sha256(password);
          await new Promise((resolve, reject) => {
            let cbName = "handleLogin_" + Date.now();
            let script = document.createElement("script");
            let done = false;
            window[cbName] = function (res) {
              if (done) return;
              done = true;
              clearTimeout(timer);
              delete window[cbName];
              script.remove();
              resolve(res);
            };
            let timer = setTimeout(() => {
              if (done) return;
              done = true;
              delete window[cbName];
              script.remove();
              reject(new Error("Request timed out."));
            }, 15000);
            script.onerror = function () {
              if (done) return;
              done = true;
              clearTimeout(timer);
              delete window[cbName];
              script.remove();
              reject(new Error("Network error."));
            };
            script.src =
              API_URL +
              "?action=login&mobile=" +
              encodeURIComponent(mobile) +
              "&password=" +
              hashedPwd +
              "&callback=" +
              cbName;
            document.body.appendChild(script);
          }).then((res) => {
            if (res.status === "success") {
              let user = res.user;
              delete user.Password;
              // Generate a unique session token for cross-device single-session enforcement
              const sessionToken =
                Math.random().toString(36).slice(2) +
                Math.random().toString(36).slice(2) +
                Date.now();
              localStorage.setItem(
                "session",
                JSON.stringify({
                  userId: user.UserId,
                  name: user.Name,
                  role: user.Role,
                  email: user.Email || "",
                  expiry: Date.now() + 30 * 60 * 1000,
                  sessionToken: sessionToken,
                })
              );
              // Write token to sheet — invalidates any active session on other devices
              if (typeof setSessionTokenOnServer === "function") {
                setSessionTokenOnServer(String(user.UserId), sessionToken);
              }
              // FIX #6: Kick out OTHER tabs on same browser instantly
              const _myLoginToken =
                Math.random().toString(36).slice(2) + Date.now();
              window._myTabToken = _myLoginToken;
              try {
                const _bc = new BroadcastChannel("mandir_session");
                _bc.postMessage({
                  type: "SESSION_REVOKED",
                  userId: String(user.UserId),
                  newTabToken: _myLoginToken,
                });
                setTimeout(() => _bc.close(), 500);
              } catch (e) {}
              setMsg(
                "loginMsg",
                "✓ Login successful! Redirecting...",
                "success"
              );
              setTimeout(() => {
                location.href =
                  user.Role === "Admin" ? "admin.html" : "user.html";
              }, 600);
            } else if (res.status === "error") {
              setMsg(
                "loginMsg",
                "❌ " + (res.message || "Account issue."),
                "error"
              );
            } else {
              setMsg(
                "loginMsg",
                "❌ Invalid mobile number or password.",
                "error"
              );
            }
          });
        } catch (err) {
          setMsg("loginMsg", "❌ " + err.message, "error");
        } finally {
          btn.disabled = false;
          btn.innerHTML =
            '<i class="fa-solid fa-right-to-bracket"></i> Secure Login';
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });

      // ── FORGOT PASSWORD
      let targetUserId, currentMobile;
      function openForgotModal() {
        currentMobile = document.getElementById("mobile").value.trim();
        if (!currentMobile) {
          setMsg("loginMsg", "Please enter your Mobile Number first.", "error");
          return;
        }
        setMsg("resetMsg1", "Verifying account for: " + currentMobile, "");
        document.getElementById("forgotModal").style.display = "flex";
        document.getElementById("resetStep1").style.display = "block";
        document.getElementById("resetStep2").style.display = "none";
      }
      function closeForgotModal() {
        document.getElementById("forgotModal").style.display = "none";
      }

      function sendOTP() {
        let email = document.getElementById("resetEmail").value.trim();
        if (!email) {
          setMsg("resetMsg1", "Please enter your registered email.", "error");
          return;
        }
        setMsg("resetMsg1", "Sending OTP...", "");
        let s = document.createElement("script");
        s.src =
          API_URL +
          "?action=sendEmailOTP&email=" +
          encodeURIComponent(email) +
          "&mobile=" +
          encodeURIComponent(currentMobile) +
          "&callback=handleOTPSent";
        document.body.appendChild(s);
      }
      function handleOTPSent(res) {
        if (res.status === "success") {
          targetUserId = res.userId;
          toast("✅ Account verified! OTP sent to your email.");
          document.getElementById("resetStep1").style.display = "none";
          document.getElementById("resetStep2").style.display = "block";
        } else {
          setMsg(
            "resetMsg1",
            "❌ " + (res.message || "Verification failed."),
            "error"
          );
        }
      }

      // FIX #4 — reset hashes new password before sending
      async function verifyAndReset() {
        let userOTP = document.getElementById("inputOTP").value.trim();
        let newPass = document.getElementById("newPassword").value;
        if (!userOTP) {
          setMsg("resetMsg2", "Please enter the OTP.", "error");
          return;
        }
        if (!newPass || newPass.length < 6) {
          setMsg(
            "resetMsg2",
            "Password must be at least 6 characters.",
            "error"
          );
          return;
        }
        let hashedNew = await sha256(newPass);
        let s = document.createElement("script");
        s.src =
          API_URL +
          "?action=resetPassword&UserId=" +
          encodeURIComponent(targetUserId) +
          "&otp=" +
          encodeURIComponent(userOTP) +
          "&NewPassword=" +
          hashedNew +
          "&callback=handleResetDone";
        document.body.appendChild(s);
      }
      function handleResetDone(res) {
        if (res.status === "success") {
          toast("✅ Password changed! Please login again.");
          closeForgotModal();
          location.reload();
        } else {
          setMsg(
            "resetMsg2",
            "❌ " + (res.message || "Invalid OTP. Please try again."),
            "error"
          );
        }
      }

      document
        .getElementById("togglePassword")
        .addEventListener("click", function () {
          let p = document.getElementById("password");
          if (p.type === "password") {
            p.type = "text";
            this.classList.replace("fa-eye", "fa-eye-slash");
            this.style.color = "#f7a01a";
          } else {
            p.type = "password";
            this.classList.replace("fa-eye-slash", "fa-eye");
            this.style.color = "#aaa";
          }
        });
    </script>
  </body>
</html>
