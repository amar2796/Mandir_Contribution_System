<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <meta name="theme-color" content="#f7a01a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SHM"/>

    <title>My Dashboard — Mandir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="chatbot_widget.js"></script>
    <style>
      :root {
        --gold:      #f7a01a;
        --gold-lt:   #fde68a;
        --gold-dim:  rgba(247,160,26,0.12);
        --gold-glow: rgba(247,160,26,0.32);
        --ink:       #141b2d;
        --ink-mid:   #334155;
        --ink-soft:  #64748b;
        --ink-faint: #94a3b8;
        --white:     #ffffff;
        --bg:        #f1f4fa;
        --bg2:       #e4e9f4;
        --green:     #22c55e;
        --red:       #ef4444;
        --blue:      #3b82f6;
        --idcolor:   #6366f1;
        --rad-xl:    22px;
        --rad-lg:    16px;
        --rad-md:    12px;
        --rad-sm:    8px;
        --sh-sm:     0 2px 8px rgba(0,0,0,0.055);
        --sh-md:     0 6px 24px rgba(0,0,0,0.085);
        --sh-lg:     0 14px 44px rgba(0,0,0,0.12);
        --t:         0.2s cubic-bezier(.4,0,.2,1);
        --font-h:    'Sora', sans-serif;
        --font-b:    'DM Sans', sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-padding-top: 68px; }
      body { font-family: var(--font-b); background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

      /* ─── HEADER ─── */
      .header {
        background: var(--white);
        height: 58px;
        padding: 0 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 500;
        border-bottom: 2.5px solid var(--gold);
        box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      }
      .header-left { display:flex; align-items:center; gap:10px; min-width:0; flex:1; }
      .hdr-icon {
        width:34px; height:34px; border-radius:10px; flex-shrink:0;
        /* background: linear-gradient(135deg,var(--ink) 0%,var(--ink-mid) 100%); */
        display:flex; align-items:center; justify-content:center;
        font-size:16px; 
        /* box-shadow:0 3px 10px rgba(0,0,0,0.18); */
      }
      .header-logo {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(247,160,26,0.55);
        box-shadow: 0 0 10px rgba(247,160,26,0.35);
        flex-shrink: 0;
        background: #78501e;
      }
      .hdr-text { min-width:0; }
      .hdr-welcome { font-size:10px; color:var(--ink-faint); font-weight:400; letter-spacing:.3px; line-height:1.1; }
      .hdr-name { font-family:var(--font-h); font-weight:700; font-size:.9rem; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:190px; line-height:1.25; display:block; }
      .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
      .hdr-avatar-wrap { position:relative; }
      .hdr-avatar {
        width:38px; height:38px; border-radius:50%; border:2.5px solid var(--gold);
        object-fit:cover; background:#faeeda; cursor:pointer; display:block;
        transition:transform var(--t), box-shadow var(--t);
        box-shadow:0 2px 10px var(--gold-glow);
      }
      .hdr-avatar:hover { transform:scale(1.08); box-shadow:0 4px 18px var(--gold-glow); }
      .hdr-dropdown {
        display:none; position:absolute; right:0; top:48px;
        background:var(--white); border-radius:var(--rad-lg);
        min-width:195px; box-shadow:var(--sh-lg);
        border:1px solid rgba(0,0,0,0.07); z-index:999; overflow:hidden;
        animation:dropFade .18s ease;
      }
      @keyframes dropFade { from{opacity:0;transform:translateY(-5px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
      .hdr-dropdown.open { display:block; }
      .hdr-drop-head {
        /* background:linear-gradient(135deg,var(--ink),var(--ink-mid)); */
        background:linear-gradient(135deg, #2a0f00 0%, #3c1a00 60%, #2a0f00 100%);
        padding:13px 16px; display:flex; align-items:center; gap:10px;
      }
      .hdr-drop-head img { width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;background:#faeeda;flex-shrink:0; }
      .hdr-drop-head-name { font-family:var(--font-h);font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:112px; }
      .hdr-drop-head-sub  { font-size:10px;color:var(--ink-faint); }
      .hdr-drop-item {
        display:flex; align-items:center; gap:10px;
        padding:11px 16px; font-family:var(--font-b); font-size:13px; font-weight:500;
        color:var(--ink-mid); cursor:pointer; transition:background var(--t);
        border-bottom:1px solid #f4f5f8;
      }
      .hdr-drop-item:last-child { border-bottom:none; }
      .hdr-drop-item:hover { background:#fafaf5; color:var(--gold); }
      .hdr-drop-item i { width:16px; text-align:center; color:var(--gold); font-size:13px; }
      .hdr-drop-item.danger { color:var(--red); }
      .hdr-drop-item.danger i { color:var(--red); }
      .hdr-drop-item.idcard { color:var(--idcolor); }
      .hdr-drop-item.idcard i { color:var(--idcolor); }
      .hdr-drop-item.danger:hover { background:#fff5f5; }

      /* ─── LAYOUT ─── */
      .main { max-width:1020px; margin:0 auto; padding:18px 14px 48px; }

      /* ─── HERO ─── */
      .hero {
        background:linear-gradient(180deg, #2a0f00 0%, #3c1a00 60%, #2a0f00 100%);
        border-radius:var(--rad-xl); padding:26px 22px 20px;
        margin-bottom:16px; position:relative; overflow:hidden;
        box-shadow:var(--sh-lg);
      }
      .hero::before {
        content:''; position:absolute; top:-80px; right:-60px;
        width:300px; height:300px; pointer-events:none;
        background:radial-gradient(circle, rgba(247,160,26,.16) 0%, transparent 68%);
        border-radius:50%;
      }
      .hero::after { content:'🕉️'; position:absolute; bottom:26px; right:16px; font-size:5.5rem; opacity:.05; pointer-events:none; line-height:1; }
      .hero-label { font-size:10.5px; font-weight:500; color:var(--ink-faint); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:4px; }
      .hero-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; gap:10px; flex-wrap:wrap; }
      .hero-amount { font-family:var(--font-h); font-size:2.7rem; font-weight:800; color:#fff; line-height:1; letter-spacing:-1.5px; }
      .hero-amount span { color:var(--gold); }
      .hero-pill {
        background:rgba(247,160,26,.15); border:1px solid rgba(247,160,26,.28);
        color:var(--gold); border-radius:30px; padding:5px 14px;
        font-size:11px; font-weight:600; white-space:nowrap; align-self:flex-start; margin-top:4px;
      }
      .hero-stats { display:flex; gap:8px; flex-wrap:wrap; }
      .hero-stat {
        flex:1; min-width:90px;
        background:rgba(255,255,255,.065); border:1px solid rgba(255,255,255,.09);
        border-radius:var(--rad-md); padding:10px 14px;
        transition:background var(--t); cursor:default;
      }
      .hero-stat:hover { background:rgba(255,255,255,.1); }
      .hero-stat-l { font-size:10px; color:var(--ink-faint); font-weight:500; margin-bottom:3px; }
      .hero-stat-v { font-family:var(--font-h); font-size:1rem; font-weight:700; color:#fff; }

      /* ─── QUICK ACTIONS ─── */
      .qa-row { display:flex; gap:9px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
      .qa-row::-webkit-scrollbar { display:none; }
      .qa-btn {
        display:inline-flex; align-items:center; gap:7px;
        padding:9px 18px; border-radius:30px; font-family:var(--font-b);
        font-size:12.5px; font-weight:600; cursor:pointer; border:none;
        white-space:nowrap; transition:all var(--t); flex-shrink:0;
        box-shadow:var(--sh-sm);
      }
      .qa-btn:active { transform:scale(.96); }
      .qa-gold  { background:var(--gold); color:#fff; box-shadow:0 4px 14px var(--gold-glow); }
      .qa-gold:hover  { background:#e8920a; }
      .qa-dark  { background:var(--ink-mid); color:#fff; }
      .qa-dark:hover  { background:var(--ink); }
      .qa-green { background:var(--green); color:#fff; box-shadow:0 4px 14px rgba(34,197,94,.28); }
      .qa-green:hover { background:#16a34a; }
      .qa-ghost { background:var(--white); color:var(--ink-mid); border:1.5px solid var(--bg2); }
      .qa-ghost:hover { border-color:var(--gold); color:var(--gold); }

      /* ─── SECTION LABEL ─── */
      .sec-lbl {
        font-family:var(--font-h); font-size:10.5px; font-weight:700;
        color:var(--ink-faint); text-transform:uppercase; letter-spacing:1.2px;
        margin:6px 2px 10px; display:flex; align-items:center; gap:8px;
      }
      .sec-lbl::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,#dde3f0,transparent); }
      .sec-lbl i { color:var(--gold); font-size:10px; }

      /* ─── CARD ─── */
      .card {
        background:var(--white); border-radius:var(--rad-xl);
        box-shadow:var(--sh-sm); margin-bottom:14px;
        border:1px solid rgba(0,0,0,0.045);
        transition:box-shadow var(--t);
        overflow:hidden;
      }
      .card:hover { box-shadow:var(--sh-md); }
      .card-hdr {
        padding:14px 18px 12px;
        display:flex; align-items:center; justify-content:space-between; gap:8px;
        border-bottom:1px solid #f0f3f9;
      }
      .card-title { font-family:var(--font-h); font-size:.85rem; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; }
      .card-title i { color:var(--gold); font-size:.82rem; }
      .c-badge { background:var(--gold-dim); color:var(--gold); border-radius:20px; padding:2px 9px; font-size:11px; font-weight:700; }
      .card-body { padding:16px 18px; }

      /* ─── GRID ─── */
      .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
      @media(max-width:640px){ .grid-2{grid-template-columns:1fr;} }

      /* ─── SUMMARY ITEMS ─── */
      .s-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f2f4fa; font-size:13px; gap:8px; }
      .s-item:last-child { border-bottom:none; }
      .s-lbl { color:var(--ink-soft); font-weight:400; }
      .s-val { color:var(--green); font-weight:700; font-family:var(--font-h); }

      /* ─── GOALS ─── */
      .goal-item {
        background:var(--white); border-radius:var(--rad-lg);
        padding:15px 17px; margin-bottom:10px;
        border:1px solid rgba(0,0,0,.045);
        border-left:4px solid var(--gold);
        box-shadow:var(--sh-sm);
        transition:box-shadow var(--t);
      }
      .goal-item:hover { box-shadow:var(--sh-md); }
      .goal-item:last-child { margin-bottom:0; }
      .goal-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; flex-wrap:wrap; }
      .goal-name { font-family:var(--font-h); font-size:13px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:7px; }
      .goal-pill { font-size:10px; font-weight:700; border-radius:20px; padding:3px 10px; white-space:nowrap; }
      .goal-track { background:var(--bg2); border-radius:8px; height:7px; overflow:hidden; margin-bottom:7px; }
      .goal-fill  { height:100%; border-radius:8px; transition:width 1.4s cubic-bezier(.4,0,.2,1); }
      .goal-nums  { display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-faint); }
      .goal-nums b { color:var(--ink-soft); }

      /* ─── BROADCAST ─── */
      .bc-item {
        background:var(--white); border-radius:var(--rad-lg);
        padding:14px 16px; margin-bottom:9px;
        border:1px solid rgba(0,0,0,.045);
        border-left:4px solid var(--gold);
        box-shadow:var(--sh-sm);
        animation:slideUp .3s ease;
      }
      @keyframes slideUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
      .bc-item:last-child { margin-bottom:0; }
      .bc-item.urgent    { border-left-color:var(--red); }
      .bc-item.important { border-left-color:var(--gold); }
      .bc-item.poll      { border-left-color:#8b5cf6; }
      .bc-item.innovation{ border-left-color:var(--green); }
      .bc-meta { display:flex; align-items:center; gap:7px; margin-bottom:5px; flex-wrap:wrap; }
      .bc-pill { font-size:10px; font-weight:700; padding:2px 8px; border-radius:12px; }
      .bc-time { font-size:11px; color:var(--ink-faint); margin-left:auto; }
      .bc-title { font-family:var(--font-h); font-size:13.5px; font-weight:700; color:var(--ink); margin-bottom:3px; }
      .bc-msg   { font-size:13px; color:var(--ink-soft); line-height:1.6; }

      /* ─── FILTERS ─── */
      .f-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
      @media(max-width:860px){ .f-grid{grid-template-columns:1fr 1fr;} }
      @media(max-width:400px){ .f-grid{grid-template-columns:1fr;} }
      .f-grp label { display:block; font-size:10px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; letter-spacing:.4px; text-transform:uppercase; }
      .f-grp input, .f-grp select {
        width:100%; padding:9px 12px;
        border:1.5px solid #e4e9f4; border-radius:var(--rad-sm);
        font-family:var(--font-b); font-size:13px; color:var(--ink);
        background:var(--bg); outline:none;
        transition:border-color var(--t), box-shadow var(--t), background var(--t);
        appearance:none; -webkit-appearance:none;
      }
      .f-grp input:focus, .f-grp select:focus { border-color:var(--gold); background:#fff; box-shadow:0 0 0 3px var(--gold-dim); }
      .f-actions { display:flex; gap:8px; flex-wrap:wrap; }

      /* ─── TABLE ─── */
      .t-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:var(--rad-lg); }
      table { width:100%; border-collapse:collapse; min-width:360px; font-size:13px; }
      thead { background:var(--ink); }
      th {
        padding:11px 14px; text-align:left;
        font-family:var(--font-h); font-size:10.5px; font-weight:700;
        color:rgba(255,255,255,.6); white-space:nowrap; letter-spacing:.5px; text-transform:uppercase;
      }
      th:first-child { border-radius:var(--rad-lg) 0 0 0; }
      th:last-child  { border-radius:0 var(--rad-lg) 0 0; }
      td { padding:11px 14px; border-bottom:1px solid #f0f3f9; white-space:nowrap; vertical-align:middle; }
      tbody tr:last-child td { border-bottom:none; }
      tbody tr { transition:background var(--t); cursor:pointer; }
      tbody tr:hover { background:#fffbf2; }
      tbody tr:hover td:first-child { box-shadow:inset 3px 0 0 var(--gold); }
      .amt-col { font-family:var(--font-h); font-weight:700; color:var(--green); }
      .type-chip { background:var(--gold-dim); color:#b45309; border-radius:20px; padding:2px 9px; font-size:11px; font-weight:600; }
      .rid-mono  { font-family:'Courier New',monospace; font-size:10.5px; color:var(--ink-faint); display:block; letter-spacing:.3px; }

      /* ─── BUTTONS ─── */
      button {
        display:inline-flex; align-items:center; gap:6px;
        padding:9px 18px; font-family:var(--font-b); font-size:13px; font-weight:600;
        border:none; border-radius:var(--rad-sm); cursor:pointer;
        transition:all var(--t); white-space:nowrap;
        background:var(--gold); color:#fff; box-shadow:0 3px 10px var(--gold-glow);
      }
      button:active { transform:scale(.96); }
      button:hover  { filter:brightness(1.08); }
      .btn-secondary { background:var(--ink-mid); box-shadow:none; }
      .btn-secondary:hover { background:var(--ink); }
      .btn-danger    { background:var(--red);  box-shadow:0 3px 10px rgba(239,68,68,.25); }
      .btn-danger:hover { background:#dc2626; }
      .btn-green     { background:var(--green); box-shadow:0 3px 10px rgba(34,197,94,.25); }
      .btn-green:hover { background:#16a34a; }
      .btn-blue      { background:var(--blue); box-shadow:none; }
      .btn-blue:hover { background:#2563eb; }
      .btn-ghost     { background:var(--white); color:var(--ink-mid); border:1.5px solid #e2e8f0; box-shadow:none; }
      .btn-ghost:hover { border-color:var(--gold); color:var(--gold); }
      .btn-sm { padding:6px 12px; font-size:11.5px; border-radius:7px; box-shadow:none; }

      /* ─── PAGINATION ─── */
      .pagination {
        display:flex; align-items:center; justify-content:center;
        gap:6px; padding:14px 16px 12px; flex-wrap:wrap;
      }
      .pg-btn {
        display:inline-flex; align-items:center; justify-content:center;
        min-width:34px; height:34px; padding:0 10px;
        border-radius:8px; font-family:var(--font-b); font-size:13px; font-weight:600;
        border:1.5px solid #e4e9f4; cursor:pointer;
        background:var(--white); color:var(--ink-mid);
        transition:all var(--t); box-shadow:none;
      }
      .pg-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); background:#fffbf2; }
      .pg-btn:disabled { opacity:.4; cursor:not-allowed; }
      .pg-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }
      .pg-info { font-size:12px; color:var(--ink-faint); padding:0 6px; }

      /* ─── PHOTO ─── */
      .photo-preview { width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);background:#faeeda;display:block;margin:0 auto 12px;box-shadow:0 4px 16px var(--gold-glow); }

      /* ─── INLINE SELECT ─── */
      .inl-sel { appearance:none;-webkit-appearance:none;background:var(--bg);border:1.5px solid #e4e9f4;border-radius:7px;padding:4px 10px;font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--ink-mid);cursor:pointer;outline:none;transition:border-color var(--t);margin:0;width:auto; }
      .inl-sel:focus { border-color:var(--gold); }

      /* ─── EMPTY ─── */
      .empty { text-align:center; padding:32px 20px; color:var(--ink-faint); }
      .empty i { font-size:2rem; margin-bottom:8px; opacity:.35; display:block; }
      .empty p { font-size:13px; margin:0; }

      /* ─── RESPONSIVE ─── */
      @media(max-width:600px){
        .main { padding:10px 10px 32px; }
        .hero { padding:18px 16px 16px; border-radius:var(--rad-lg); }
        .hero-amount { font-size:2.1rem; }
        .hdr-name { max-width:130px; font-size:.84rem; }
        .header { padding:0 12px; height:54px; }
        .col-year,.col-rcpt { display:none; }
        th,td { padding:9px 10px; font-size:12px; }
        .card-body { padding:13px 13px; }
        .card-hdr  { padding:12px 13px 10px; }
        .header-logo { width:37px; height:37px; }
        .hdr-icon { width:32px; height:32px; }
      }
      @media(max-width:400px){
        .hero-stat { min-width:80px; padding:8px 11px; }
        .hero-stat-v { font-size:.92rem; }
      }

      /* ─── SCROLLBAR ─── */
      ::-webkit-scrollbar { width:5px; height:5px; }
      ::-webkit-scrollbar-track { background:transparent; }
      ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:4px; }
      ::-webkit-scrollbar-thumb:hover { background:var(--gold); }
    </style>
  </head>
  <body>

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="hdr-icon">
          <img src="Image/logo.PNG" alt="Mandir Logo" class="header-logo" onerror="this.style.display='none';document.getElementById('hdrIcon').style.display='inline';">
          <i id="hdrIcon" class="fa-solid fa-place-of-worship" style="display:none;color:#f7a01a;font-size:1.4rem;filter:drop-shadow(0 0 6px rgba(247,160,26,0.6));"></i>
        </div>
        <div class="hdr-text">
          <div class="hdr-welcome">Welcome back,</div>
          <span class="hdr-name" id="hdr_name">Loading…</span>
        </div>
      </div>
      <div class="header-right">
        <div class="hdr-avatar-wrap">
          <img id="hdr_photo" class="hdr-avatar" src=""

      /* ═══ CHANGE PASSWORD ════════════════════════════════════════════
   Opens a modal with 3 fields: current password, new password,
   confirm new password. Verifies current, then updates via
   existing updateUser action. No new Apps Script action needed.
   ═══════════════════════════════════════════════════════════════ */
function openChangePassword() {
  const html = `
    <div class="_mhdr">
      <h3><i class="fa-solid fa-key" style="color:#3b82f6;"></i> Change Password</h3>
      <button class="_mcls" onclick="closeModal()">×</button>
    </div>
    <div class="_mbdy">
      <p style="font-size:12.5px;color:#64748b;margin:0 0 16px;line-height:1.6;">
        Enter your current password to verify, then set a new one.<br>
        Minimum 6 characters.
      </p>
      <label class="_fl">Current Password</label>
      <div style="position:relative;margin-bottom:14px;">
        <input class="_fi" type="password" id="cp_current"
          placeholder="Your current password"
          style="margin-bottom:0;padding-right:44px;"/>
        <span onclick="_cpToggle('cp_current',this)"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
          font-size:12px;color:#888;cursor:pointer;font-weight:600;">Show</span>
      </div>
      <label class="_fl">New Password</label>
      <div style="position:relative;margin-bottom:14px;">
        <input class="_fi" type="password" id="cp_new"
          placeholder="New password (min 6 chars)"
          style="margin-bottom:0;padding-right:44px;"
          oninput="_cpStrength(this.value)"/>
        <span onclick="_cpToggle('cp_new',this)"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
          font-size:12px;color:#888;cursor:pointer;font-weight:600;">Show</span>
      </div>
      <div id="cp_strength" style="height:4px;border-radius:2px;background:#f1f5f9;
        margin:-8px 0 12px;overflow:hidden;">
        <div id="cp_strength_bar"
          style="height:100%;width:0%;border-radius:2px;transition:width .3s,background .3s;"></div>
      </div>
      <label class="_fl">Confirm New Password</label>
      <div style="position:relative;margin-bottom:6px;">
        <input class="_fi" type="password" id="cp_confirm"
          placeholder="Repeat new password"
          style="margin-bottom:0;padding-right:44px;"/>
        <span onclick="_cpToggle('cp_confirm',this)"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
          font-size:12px;color:#888;cursor:pointer;font-weight:600;">Show</span>
      </div>
      <div id="cp_msg" style="font-size:12px;min-height:18px;margin-bottom:4px;"></div>
    </div>
    <div class="_mft">
      <button class="_mbtn" style="background:#94a3b8;" onclick="closeModal()">
        Cancel
      </button>
      <button class="_mbtn" id="cp_save_btn" style="background:#3b82f6;"
        onclick="saveNewPassword()">
        <i class="fa-solid fa-key"></i> Update Password
      </button>
    </div>`;
  openModal(html, "420px");
  // Focus current password field after modal opens
  setTimeout(function() {
    var el = document.getElementById("cp_current");
    if (el) el.focus();
  }, 120);
}
 
/* Toggle show/hide for password fields */
function _cpToggle(inputId, btn) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  if (inp.type === "password") {
    inp.type = "text";
    btn.textContent = "Hide";
  } else {
    inp.type = "password";
    btn.textContent = "Show";
  }
}
 
/* Strength bar under new password field */
function _cpStrength(val) {
  var bar = document.getElementById("cp_strength_bar");
  if (!bar) return;
  var score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  var pct   = [0, 25, 50, 70, 85, 100][Math.min(score, 5)];
  var color = score <= 1 ? "#ef4444" : score <= 2 ? "#f59e0b" : score <= 3 ? "#3b82f6" : "#22c55e";
  bar.style.width      = pct + "%";
  bar.style.background = color;
}
 
/* Set message inside modal */
function _cpMsg(msg, color) {
  var el = document.getElementById("cp_msg");
  if (el) { el.textContent = msg; el.style.color = color || "#ef4444"; }
}
 
/* Main save function */
async function saveNewPassword() {
  var currentVal = (document.getElementById("cp_current")?.value || "");
  var newVal     = (document.getElementById("cp_new")?.value     || "");
  var confirmVal = (document.getElementById("cp_confirm")?.value || "");
 
  // Client-side validation
  if (!currentVal) { _cpMsg("Please enter your current password."); return; }
  if (newVal.length < 6) { _cpMsg("New password must be at least 6 characters."); return; }
  if (newVal !== confirmVal) { _cpMsg("New passwords do not match."); return; }
  if (newVal === currentVal) { _cpMsg("New password must be different from current password."); return; }
 
  var btn = document.getElementById("cp_save_btn");
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...'; }
 
  try {
    var s         = JSON.parse(localStorage.getItem("session") || "{}");
    var myProfile = (typeof users !== "undefined" ? users : [])
      .find(function(u) { return String(u.UserId) === String(s.userId); });
 
    if (!myProfile) {
      _cpMsg("Profile not loaded. Please refresh and try again.");
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password'; }
      return;
    }
 
    // Verify current password — hash and compare against stored hash
    var currentHash  = await sha256(currentVal);
    var storedHash   = String(myProfile.Password || "").toLowerCase();
 
    // Note: allData strips Password from users for security.
    // If Password is not available in loaded users, fall back to server verification.
    if (storedHash && storedHash.length === 64) {
      // Password hash is available — verify client-side (faster, no extra API call)
      if (currentHash !== storedHash) {
        _cpMsg("Current password is incorrect.");
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password'; }
        return;
      }
    }
    // If storedHash not available (getAllData strips it) — server will reject
    // wrong current password because updateUser compares on the sheet side.
    // We send currentHash as OldPassword for server-side verification.
 
    var newHash = await sha256(newVal);
 
    // updateUser already handles password update when Password param is non-empty
    // We send OldPassword so the server can optionally verify it (see appscript note below)
    var res = await postData({
      action:      "changePassword",
      UserId:      s.userId,
      OldPassword: currentHash,
      NewPassword: newHash
    });
 
    if (res && res.status === "success") {
      closeModal();
      toast("✅ Password updated successfully. Please use new password next time you log in.", "");
    } else {
      _cpMsg(res?.message || "Current password is incorrect or update failed.");
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password'; }
    }
 
  } catch(err) {
    _cpMsg("Error: " + err.message);
    var b = document.getElementById("cp_save_btn");
    if (b) { b.disabled = false; b.innerHTML = '<i class="fa-solid fa-key"></i> Update Password'; }
  }
}

      let _pgList=[], _pgPage=1;
      const _pgSize=10;

      function renderTable(list){
        _pgList=list;
        _pgPage=1;

      }

      function _renderPage(){
        const list=_pgList;
        const totalPages=Math.max(1,Math.ceil(list.length/_pgSize));
        if(_pgPage<1)_pgPage=1;
        if(_pgPage>totalPages)_pgPage=totalPages;

        const ce=document.getElementById("recordsCount");if(ce)ce.textContent=list.length;

        const start=(_pgPage-1)*_pgSize;
        const pageItems=list.slice(start,start+_pgSize);

        document.getElementById("tableBody").innerHTML=list.length===0
          ?`<tr><td colspan="7"><div class="empty"><i class="fa-solid fa-receipt"></i><p>No records found</p></div></td></tr>`
          :pageItems.map((c,i)=>{
            const globalIdx=start+i;
            let type=types.find(t=>String(t.TypeId)===String(c.TypeId))?.TypeName||"Contribution";
            let oName=occasions.find(o=>String(o.OccasionId)===String(c.OccasionId))?.OccasionName||"—";
            let uName=users.find(u=>String(u.UserId)===String(c.UserId))?.Name||"Me";
            const rid=_storeReceipt(c,uName,type,oName);
            let dRID=(c.ReceiptID||"").replace(/^TRX-/,"MNR-");
            return `<tr onclick="showReceiptById('${rid}')" title="Click for receipt">
              <td style="color:var(--ink-faint);font-size:12px;">${globalIdx+1}</td>
              <td class="amt-col">₹ ${fmt(c.Amount)}</td>
              <td><b>${escapeHtml(c.ForMonth||"—")}</b></td>
              <td class="col-year" style="color:var(--ink-soft);">${c.Year||"—"}</td>
              <td><span class="rid-mono">${escapeHtml(dRID)}</span><span class="type-chip">${escapeHtml(type)}</span></td>
              <td style="font-size:11.5px;color:var(--ink-soft);">${escapeHtml(formatPaymentDate(c.PaymentDate))}</td>
              <td class="col-rcpt"><button class="btn-blue btn-sm" onclick="event.stopPropagation();showReceiptById('${rid}')"><i class="fa-solid fa-receipt"></i></button></td>
            </tr>`;
          }).join("");

        // Pagination bar
        const bar=document.getElementById("paginationBar");
        if(!bar)return;
        if(list.length<=_pgSize){bar.innerHTML="";return;}

        let pages="";
        // Always show first, last, current ±1
        const show=new Set([1,totalPages,_pgPage,_pgPage-1,_pgPage+1].filter(p=>p>=1&&p<=totalPages));
        const sorted=Array.from(show).sort((a,b)=>a-b);
        let prev=-1;
        for(const p of sorted){
          if(prev!==-1&&p-prev>1)pages+=`<span class="pg-info">…</span>`;
          pages+=`<button class="pg-btn${p===_pgPage?" active":""}" onclick="_goPage(${p})">${p}</button>`;
          prev=p;
        }

        bar.innerHTML=`<div class="pagination">
          <button class="pg-btn" onclick="_goPage(${_pgPage-1})" ${_pgPage===1?"disabled":""}>‹</button>
          ${pages}
          <button class="pg-btn" onclick="_goPage(${_pgPage+1})" ${_pgPage===totalPages?"disabled":""}>›</button>
          <span class="pg-info">${start+1}–${Math.min(start+_pgSize,list.length)} of ${list.length}</span>
        </div>`;
      }

      function _goPage(p){
        const totalPages=Math.max(1,Math.ceil(_pgList.length/_pgSize));
        if(p<1||p>totalPages)return;
        _pgPage=p;
        const scrollY=window.scrollY;
        _renderPage();
        window.scrollTo({top:scrollY,behavior:"instant"});
      }

      /* ═══ MEMBER ID CARD PDF ═════════════════════════════════════════
   Generates a CR80 landscape ID card (85.6 × 54 mm).
   Uses jsPDF already loaded. No server call needed.
   ═══════════════════════════════════════════════════════════════ */
 // ✅ Helper: load image → base64
 function loadImageAsBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "Anonymous";

    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      resolve(canvas.toDataURL("image/png"));
    };

    img.onerror = reject;
    img.src = url;
  });
}

<script>
  /* ── Service Worker registration ── */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("./sw.js").then(function(reg) {
   
        // Detect when a new SW version is waiting — prompt user to refresh
        reg.addEventListener("updatefound", function() {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener("statechange", function() {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              // New version available — show update toast if toast() is available
              // Otherwise show a simple confirm dialog
              if (typeof toast === "function") {
                toast("🔄 App updated — tap here to refresh", "warn");
                // Auto-reload after 4 seconds so admin always gets latest code
                setTimeout(function() { location.reload(); }, 4000);
              } else {
                if (confirm("App updated. Reload now for the latest version?")) {
                  location.reload();
                }
              }
            }
          });
        });
   
      }).catch(function(err) {
        // SW registration failed — app still works normally without it
        console.warn("Service Worker registration failed:", err);
      });
    });
  }
  </script>
